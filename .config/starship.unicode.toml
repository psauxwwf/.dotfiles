"$schema" = "https://starship.rs/config-schema.json"
palette = "dracula"
add_newline = false
# Original format:
# format = """\
# $directory $fill $cmd_duration $time $all
# """
format = """\
$username$hostname$localip$shlvl$singularity$kubernetes$nats$directory$vcsh$fossil_branch$fossil_metrics$git_branch$git_commit$git_state$git_metrics$git_status$hg_branch$hg_state$pijul_channel$docker_context$package$bun$c$cmake$cobol$cpp$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$maven$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pulumi$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$xmake$zig$buf$guix_shell$nix_shell$conda$pixi$meson$spack$memory_usage$aws$gcloud$openstack$azure$direnv$env_var$mise$crystal$custom$sudo$jobs$battery$status$container$netns$os$shell$fill$cmd_duration$time$line_break$character
"""

[fill]
symbol = "━"
style = "current_line"

[character]
error_symbol = "[>](bold red)"
success_symbol = "[>](bold green)"

[cmd_duration]
style = "bold yellow"
format = "[ $duration]($style)"

[time]
disabled = false
format = '[ $time]($style)'
style = 'bold cyan'

[directory]
style = "bold green"
read_only = " 🔒"

[git_branch]
style = "bold pink"
symbol = "🌿 "

[git_status]
style = "bold red"

[hostname]
style = "bold purple"
ssh_symbol = "🔐 "

[username]
format = "[$user]($style) on "
style_user = "bold cyan"

[os]
disabled = true

# Define Dracula color palette
[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
