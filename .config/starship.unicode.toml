"$schema" = "https://starship.rs/config-schema.json"
palette = "dracula"
add_newline = false
# Original format:
# format = """\
# $directory $fill $cmd_duration $time $all
# """
format = """\
$directory$username$hostname$os$fill $localip$shlvl$singularity$kubernetes$nats$vcsh$fossil_branch$fossil_metrics$git_branch$git_commit$git_state$git_metrics$git_status$hg_branch$hg_state$pijul_channel$docker_context$package$bun$c$cmake$cobol$cpp$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$maven$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pulumi$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$xmake$zig$buf$guix_shell$nix_shell$conda$pixi$meson$spack$memory_usage$aws$gcloud$openstack$azure$direnv$env_var$mise$crystal$custom$sudo$jobs$battery$status$container$netns$shell$cmd_duration$time$line_break$character
"""

[fill]
symbol = "━"
style = "current_line"

[character]
error_symbol = "[x](bold red)"
success_symbol = "[>](bold green)"

[cmd_duration]
style = "bold yellow"
format = "[$duration]($style) "

[time]
disabled = false
format = '[$time]($style) '
style = 'comment'

[directory]
format = " [$path]($style)[$read_only]($read_only_style) "
style = "bold green"
read_only = " [ro]"

[git_branch]
style = "bold pink"
symbol = "± "

[git_status]
style = "bold red"

[hostname]
style = "bold purple"
ssh_symbol = "ssh "
ssh_only = false

[username]
format = "[$user]($style) "
show_always = true
style_user = "bold cyan"

[os]
disabled = false
format = "[$symbol]($style) "

# Define Dracula color palette
[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
