[language-server.scls]
command = "simple-completion-language-server"

[language-server.scls.config]
feature_words = true  # enable completion by word
feature_snippets = true  # enable snippets
snippets_first = true  # completions will return before snippets by default
snippets_inline_by_word_tail = false  # suggest snippets by WORD tail, for example text `xsq|` become `x^2|` when snippet `sq` has body `^2`
feature_unicode_input = true  # enable "unicode input"
feature_paths = true  # enable path completion
feature_citations = true  # enable citation completion (only on `citation` feature enabled)

[language-server.pyright.config.python.analysis]
typeCheckingMode = "basic"

[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.nimlsp]
command = "nimlsp"

[language-server.nimlangserver]
command = "nimlangserver"

[language-server.gopls.config]
gofumpt = true
# [language-server.golangci-lint-langserver]
# command = "golangci-lint-langserver"
# [language-server.gopls]
# command = "gopls"

[language-server.iwe]
command = "iwes"

[language-server.some-sass-language-server]
command = "some-sass-language-server"
args = ["--stdio"]
# see https://wkillerud.github.io/some-sass/language-server/settings.html for all available settings
config = { somesass = { workspace = { loadPaths = [] } } }

[[language-server.typescript-language-server.config.plugins]]
name = "@vue/typescript-plugin"
location = "/home/d6f/.local/share/mise/installs/node/24.11.1/lib/node_modules/@vue/typescript-plugin"
languages = ["vue"]

[[language]]
name = "text"
scope = "text.plain"
file-types = [
  "txt",
  "text",
  "asc",
  "nfo",
  "ans",
  "lst",
  "list",
  "note",
  "notes",
  "out",
  "err",
  "dump",
  "trace",
  "bak",
  "old",
  { glob = "README" },
  { glob = "LICENSE" },
  { glob = "COPYING" },
  { glob = "NOTICE" },
  { glob = "AUTHORS" },
  { glob = "TODO" },
  { glob = "NOTES" },
  { glob = "CHANGELOG" },
  { glob = "HISTORY" },
  { glob = "NEWS" },
  { glob = "FAQ" },
  { glob = "THANKS" },
  { glob = "INSTALL" },
]
language-servers = ["scls"]

[[language]]
name = "toml"
language-servers = ["scls", "taplo", "tombi"]
auto-format = true
formatter = { command = "tombi", args = [
  "format",
  "-",
  "--stdin-filename",
  "%{buffer_name}"
] }

[[language]]
name = "ini"
language-servers = ["scls"]

[[language]]
name = "templ"
auto-format = true
formatter = { command = "templ", args = ["fmt"] }

[[language]]
name = "env"
language-servers = ["scls"]

[[language]]
name = "html"
language-servers = [
  { name = "superhtml", except-features = [
    "format",
  ] },
  "vscode-html-language-server",
]
auto-format = true

[[language]]
name = "cfg"
scope = "source.ini"
grammar = "ini"
file-types = ["cfg"]
language-servers = ["scls"]

[[language]]
name = "c"
auto-format = true
formatter = { command = "clang-format", args = [
  "--style",
  "{ColumnLimit: 256}",
] }

[[language]]
name = "conf"
scope = "source.ini"
grammar = "ini"
file-types = ["conf"]
language-servers = ["scls"]

[[language]]
name = "log"
scope = "source.log"
file-types = ["log"]
language-servers = ["scls"]

[[language]]
name = "cpp"
auto-format = true
formatter = { command = "clang-format", args = [
  "--style",
  "{ColumnLimit: 256}",
] }

[[language]]
name = "python"
roots = [
  "pyproject.toml",
  "setup.py",
  "Poetry.lock",
  ".git",
  "main.py",
  ".venv",
]
language-servers = ["pyright", "ruff"]
# language-servers = ["basedpyright", "ruff"]
auto-format = true

# [language-server.pylyzer]
# command = "pylyzer"
# args = ["--server"]
[language.formatter]
command = "sh"
args = ["-c", "ruff check --fix - | ruff format --line-length 88 -"]
# command = "black"
# args = ["--line-length", "88", "--quiet", "-"]

[[language]]
name = "protobuf"
auto-format = true
formatter = { command = "clang-format", args = [] }

[[language]]
name = "nim"
auto-format = true
language-servers = ["nimlsp", "nimlangserver"]

[language.formatter]
command = "nph"
args = ["-"]

[[language]]
name = "bash"
auto-format = true
formatter = { command = "shfmt", args = [] }

[[language]]
name = "go"
auto-format = true
formatter = { command = "goimports" }

[[language]]
name = "docker-compose"
auto-format = true
formatter = { command = "prettier", args = ["--parser", "yaml"] }

[[language]]
name = "yaml"
language-servers = ["scls", "yaml-language-server", "ansible-language-server"]
auto-format = true
formatter = { command = "prettier", args = ["--parser", "yaml"] }
